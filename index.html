document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:'Jost',sans-serif;font-size:14px;color:#1A1A1A;outline:none;\" style-focus=\"border-color:#1A1A1A;background:#fff;\">\n              <option value=\"Rings\">Rings<\u002Foption>\n              <option value=\"Necklaces\">Necklaces<\u002Foption>\n              <option value=\"Earrings\">Earrings<\u002Foption>\n              <option value=\"Bracelets\">Bracelets<\u002Foption>\n              <option value=\"Bridal\">Bridal<\u002Foption>\n              <option value=\"Custom\">Custom<\u002Foption>\n            <\u002Fselect>\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9790;margin-bottom:6px;\">Gold weight<\u002Flabel>\n            <input value=\"{{ form.goldWeight }}\" oninput=\"{{ fh.goldWeight }}\" placeholder=\"e.g. 4.20 g\" style=\"width:100%;border:1px solid #E3E1DD;background:#FAFAF8;padding:11px 13px;font-family:'Jost',sans-serif;font-size:14px;color:#1A1A1A;outline:none;\" style-focus=\"border-color:#1A1A1A;background:#fff;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n          <div>\n            <label style=\"display:block;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9790;margin-bottom:6px;\">Material / Metal<\u002Flabel>\n            <input value=\"{{ form.metal }}\" oninput=\"{{ fh.metal }}\" placeholder=\"e.g. 18k White Gold\" style=\"width:100%;border:1px solid #E3E1DD;background:#FAFAF8;padding:11px 13px;font-family:'Jost',sans-serif;font-size:14px;color:#1A1A1A;outline:none;\" style-focus=\"border-color:#1A1A1A;background:#fff;\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9790;margin-bottom:6px;\">Gemstone / Carats<\u002Flabel>\n            <input value=\"{{ form.gemstone }}\" oninput=\"{{ fh.gemstone }}\" placeholder=\"e.g. 1.20 ct Diamond\" style=\"width:100%;border:1px solid #E3E1DD;background:#FAFAF8;padding:11px 13px;font-family:'Jost',sans-serif;font-size:14px;color:#1A1A1A;outline:none;\" style-focus=\"border-color:#1A1A1A;background:#fff;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;\">\n          <div>\n            <label style=\"display:block;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9790;margin-bottom:6px;\">Price<\u002Flabel>\n            <input value=\"{{ form.price }}\" oninput=\"{{ fh.price }}\" placeholder=\"$0,000 or leave blank\" style=\"width:100%;border:1px solid #E3E1DD;background:#FAFAF8;padding:11px 13px;font-family:'Jost',sans-serif;font-size:14px;color:#1A1A1A;outline:none;\" style-focus=\"border-color:#1A1A1A;background:#fff;\">\n          <\u002Fdiv>\n          <div>\n            <label style=\"display:block;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9790;margin-bottom:6px;\">Dimensions / Size<\u002Flabel>\n            <input value=\"{{ form.dimensions }}\" oninput=\"{{ fh.dimensions }}\" placeholder=\"e.g. Size 6 · 2.0 mm\" style=\"width:100%;border:1px solid #E3E1DD;background:#FAFAF8;padding:11px 13px;font-family:'Jost',sans-serif;font-size:14px;color:#1A1A1A;outline:none;\" style-focus=\"border-color:#1A1A1A;background:#fff;\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <label style=\"display:block;font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:#9A9790;margin-bottom:6px;\">Description<\u002Flabel>\n          <textarea value=\"{{ form.description }}\" oninput=\"{{ fh.description }}\" rows=\"3\" placeholder=\"A short, evocative note about the piece.\" style=\"width:100%;border:1px solid #E3E1DD;background:#FAFAF8;padding:11px 13px;font-family:'Jost',sans-serif;font-size:14px;line-height:1.5;color:#1A1A1A;outline:none;resize:vertical;\" style-focus=\"border-color:#1A1A1A;background:#fff;\"><\u002Ftextarea>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ formError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:14px;font-size:12px;letter-spacing:0.04em;color:#8A2F2F;\">A name is required to save the piece.<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div style=\"display:flex;justify-content:flex-end;gap:12px;margin-top:26px;\">\n        <button onclick=\"{{ onCancelForm }}\" style=\"background:#fff;border:1px solid #E3E1DD;color:#1A1A1A;padding:13px 22px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;cursor:pointer;\" style-hover=\"border-color:#1A1A1A;\">Cancel<\u002Fbutton>\n        <button onclick=\"{{ onSaveForm }}\" style=\"background:#1A1A1A;border:1px solid #1A1A1A;color:#fff;padding:13px 26px;font-family:'Jost',sans-serif;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;cursor:pointer;\" style-hover=\"background:#000;\">Save piece<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;brandName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Hearts &amp; Diamonds&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;brandTagline&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Fine Jewelry&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;whatsappNumber&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+9720542307870&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;ownerPassword&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;diamonds&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;contactPhone&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;+972 54-230-7870&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;contactEmail&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;ettyscharf@gmail.com&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;contactAddress&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;הבורסה לתכשיטים רמת גן&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;contactInstagram&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;@heartsndiamond&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;startInOwnerMode&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  KEY = 'hd_archive_v1';\n  AUTH_KEY = 'hd_owner_v1';\n  cats = ['All','Rings','Necklaces','Earrings','Bracelets','Bridal','Custom'];\n  featuredNames = ['Halo Promise','Cascade Riviera','Solitaire Aria','Drop Serène','Tennis Éclat'];\n  GRADS = [\n    'linear-gradient(135deg,#EDECEA 0%,#D9D7D2 100%)',\n    'linear-gradient(135deg,#E7E9EC 0%,#D2D5DB 100%)',\n    'linear-gradient(135deg,#EFEAE6 0%,#DCD3CA 100%)',\n    'linear-gradient(135deg,#E9ECEA 0%,#D1D7D3 100%)',\n    'linear-gradient(135deg,#ECEAEC 0%,#D6D2D7 100%)',\n  ];\n\n  state = {\n    pieces: this.seed(),\n    page: 'home',\n    activeCategory: 'All',\n    activeSlide: 0,\n    query: '',\n    authed: false,\n    loginOpen: false,\n    loginValue: '',\n    loginError: false,\n    selectedId: null,\n    formOpen: false,\n    formMode: 'add',\n    form: null,\n    formError: false,\n  };\n\n  seed() {\n    const raw = [\n      ['Rings','Solitaire Aria','Platinum','1.20 ct Round Diamond','Size 6 · 2.0 mm band','$4,800','3.8 g','A single brilliant-cut diamond raised on a whisper-thin platinum band.'],\n      ['Rings','Eternity Vow','18k White Gold','1.05 ct tw Diamonds','Size 6.5','$3,600','4.2 g','Diamonds set continuously around the band — light from every angle.'],\n      ['Rings','Signet Noir','18k Yellow Gold','Black Onyx','Size 8','$1,250','9.5 g','A modern signet with a polished onyx face.'],\n      ['Rings','Petale Stack','14k Rose Gold','0.15 ct Diamond','Size 5–7','$690','2.1 g','A delicate stacking band with a single flush-set diamond.'],\n      ['Necklaces','Lumière Pendant','18k White Gold','0.50 ct Diamond','18 in chain','$2,200','2.6 g','A solitaire pendant suspended on a fine cable chain.'],\n      ['Necklaces','Cascade Riviera','Platinum','4.2 ct tw Diamonds','16 in','$9,500','12.4 g','A graduated line of diamonds that pools at the collarbone.'],\n      ['Necklaces','Petite Bar','14k Yellow Gold','—','16–18 in adjustable','$480','1.9 g','A minimal horizontal bar on an adjustable chain.'],\n      ['Necklaces','Lune Locket','18k Yellow Gold','Mother of Pearl','20 in','$1,340','6.8 g','An engravable locket with a mother-of-pearl inlay.'],\n      ['Earrings','Aurora Studs','18k White Gold','1.00 ct tw Diamonds','5 mm','$1,900','2.4 g','A matched pair of round brilliants in four-prong settings.'],\n      ['Earrings','Drop Serène','Platinum','0.80 ct tw Sapphire & Diamond','22 mm drop','$2,650','3.6 g','Sapphire drops suspended beneath a diamond crown.'],\n      ['Earrings','Huggie Lune','14k Yellow Gold','—','12 mm','$390','2.0 g','Everyday huggie hoops with a softly brushed finish.'],\n      ['Bracelets','Tennis Éclat','18k White Gold','3.0 ct tw Diamonds','7 in','$6,400','14.2 g','A classic line bracelet of perfectly matched round diamonds.'],\n      ['Bracelets','Bangle Silhouette','18k Yellow Gold','—','60 mm inner','$1,150','11.0 g','A sculptural open bangle in high-polish gold.'],\n      ['Bracelets','Charm Mémoire','14k Rose Gold','0.10 ct Diamond','7 in','$720','3.3 g','A fine chain bracelet with a single diamond charm.'],\n      ['Bridal','Halo Promise','Platinum','1.50 ct Diamond + pavé halo','Size 6','$7,200','4.5 g','A center diamond framed by a halo of pavé brilliance.'],\n      ['Bridal','Trilogy Toujours','18k White Gold','1.80 ct tw Diamonds','Size 6.5','$8,900','4.8 g','Past, present, future — three diamonds in a row.'],\n      ['Bridal','Wedding Band Duet','Platinum','0.40 ct tw Diamonds','Size 6','$1,900','3.1 g','A slim pavé band designed to nest with a solitaire.'],\n      ['Custom','Bespoke No. 014','Client-supplied gold','To be selected','Made to measure','Price on request','5.0 g','A commissioned design developed from the client\\u2019s own sketch.'],\n      ['Custom','Heirloom Reset','Reclaimed metal','Heirloom stones','By consultation','Price on request','4.0 g','Resetting inherited stones into a contemporary mount.'],\n    ];\n    return raw.map((r, i) => ({ id: 'seed' + i, category: r[0], name: r[1], metal: r[2], gemstone: r[3], dimensions: r[4], price: r[5], goldWeight: r[6], description: r[7] }));\n  }\n\n  componentDidMount() {\n    try {\n      const rawData = localStorage.getItem(this.KEY);\n      if (rawData) {\n        const arr = JSON.parse(rawData);\n        if (Array.isArray(arr) && arr.length) this.setState({ pieces: arr });\n      }\n      if (localStorage.getItem(this.AUTH_KEY) === '1') this.setState({ authed: true });\n    } catch (e) {}\n    if (this.props.startInOwnerMode) this.setState({ authed: true });\n    this._heroLen = this.featuredNames.length;\n    this._slideTimer = setInterval(() => {\n      this.setState(s => ({ activeSlide: (s.activeSlide + 1) % (this._heroLen || 1) }));\n    }, 4200);\n  }\n\n  componentWillUnmount() { if (this._slideTimer) clearInterval(this._slideTimer); }\n\n  persist(list) { try { localStorage.setItem(this.KEY, JSON.stringify(list)); } catch (e) {} }\n  uid() { return 'p' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }\n  emptyForm() { return { id: null, name: '', category: 'Rings', price: '', metal: '', gemstone: '', dimensions: '', description: '', goldWeight: '' }; }\n\n  goHome() { this.setState({ page: 'home', selectedId: null }); }\n  enterCategory(c) { this.setState({ page: 'archive', activeCategory: c, selectedId: null, query: '' }); try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) {} }\n\n  openLogin() { this.setState({ loginOpen: true, loginValue: '', loginError: false }); }\n  cancelLogin() { this.setState({ loginOpen: false, loginValue: '', loginError: false }); }\n  submitLogin() {\n    const pw = this.props.ownerPassword ?? 'diamonds';\n    if (this.state.loginValue === pw) {\n      this.setState({ authed: true, loginOpen: false, loginValue: '', loginError: false });\n      try { localStorage.setItem(this.AUTH_KEY, '1'); } catch (e) {}\n    } else {\n      this.setState({ loginError: true });\n    }\n  }\n  logout() { this.setState({ authed: false }); try { localStorage.setItem(this.AUTH_KEY, '0'); } catch (e) {} }\n\n  openAdd() { this.setState({ formOpen: true, formMode: 'add', form: this.emptyForm(), formError: false }); }\n  openEdit(p) { this.setState({ formOpen: true, formMode: 'edit', form: { ...p }, selectedId: null, formError: false }); }\n  cancelForm() { this.setState({ formOpen: false, form: null, formError: false }); }\n  setField(k, v) { this.setState(s => ({ form: { ...s.form, [k]: v }, formError: false })); }\n\n  saveForm() {\n    const f = this.state.form;\n    if (!f.name.trim()) { this.setState({ formError: true }); return; }\n    let list;\n    if (this.state.formMode === 'add') {\n      list = [{ ...f, id: this.uid() }, ...this.state.pieces];\n    } else {\n      list = this.state.pieces.map(p => p.id === f.id ? { ...f } : p);\n    }\n    this.persist(list);\n    this.setState({ pieces: list, formOpen: false, form: null, formError: false });\n  }\n\n  removePiece(id) {\n    const list = this.state.pieces.filter(p => p.id !== id);\n    this.persist(list);\n    this.setState({ pieces: list, selectedId: null });\n  }\n\n  resetArchive() {\n    const s = this.seed();\n    this.persist(s);\n    this.setState({ pieces: s, selectedId: null });\n  }\n\n  renderVals() {\n    const brandName = this.props.brandName ?? 'Hearts & Diamonds';\n    const brandTagline = this.props.brandTagline ?? 'Fine Jewelry';\n    const ownerPassword = this.props.ownerPassword ?? 'diamonds';\n    const wa = (this.props.whatsappNumber ?? '15551234567').replace(/[^0-9]/g, '');\n    const { activeCategory, query, page } = this.state;\n    const all = this.state.pieces;\n    const ownerMode = this.state.authed;\n    const q = query.trim().toLowerCase();\n\n    const counts = {};\n    this.cats.forEach(c => { counts[c] = c === 'All' ? all.length : all.filter(p => p.category === c).length; });\n\n    let list = all;\n    if (activeCategory !== 'All') list = list.filter(p => p.category === activeCategory);\n    if (q) list = list.filter(p => (p.name + ' ' + p.metal + ' ' + p.gemstone + ' ' + p.category).toLowerCase().includes(q));\n\n    const goldChip = { fontFamily: \"'Jost',sans-serif\", fontSize: '10px', letterSpacing: '0.14em', textTransform: 'uppercase', padding: '4px 10px', borderRadius: '999px', whiteSpace: 'nowrap', color: '#8A6A2F', background: '#F6EFDD' };\n\n    const enrich = (p) => ({\n      ...p,\n      priceLabel: (p.price && String(p.price).trim()) ? p.price : 'Price on request',\n      hasGold: !!(p.goldWeight && String(p.goldWeight).trim()),\n      onSelect: () => this.setState({ selectedId: p.id }),\n      onEdit: (e) => { if (e) e.stopPropagation(); this.openEdit(p); },\n      onDelete: (e) => { if (e) e.stopPropagation(); if (window.confirm('Delete \"' + p.name + '\" from the archive?')) this.removePiece(p.id); },\n    });\n\n    const piecesView = list.map(enrich);\n\n    // nav links\n    const navBase = { background: 'none', border: 'none', cursor: 'pointer', fontFamily: \"'Jost',sans-serif\", fontSize: '11.5px', letterSpacing: '0.18em', textTransform: 'uppercase', padding: '6px 0', color: '#8A877F', borderBottom: '1px solid transparent', transition: 'all .2s', flexShrink: 0, whiteSpace: 'nowrap' };\n    const navActive = { ...navBase, color: '#1A1A1A', borderBottom: '1px solid #1A1A1A' };\n    const navDefs = [{ label: 'Collection', cat: 'All' }].concat(this.cats.filter(c => c !== 'All').map(c => ({ label: c, cat: c })));\n    const navLinks = navDefs.map(d => ({\n      label: d.label,\n      onClick: () => this.enterCategory(d.cat),\n      style: (page === 'archive' && activeCategory === d.cat) ? navActive : navBase,\n    }));\n    navLinks.push({\n      label: 'Contact',\n      onClick: () => { this.setState({ page: 'contact', selectedId: null }); try { window.scrollTo({ top: 0, behavior: 'smooth' }); } catch (e) {} },\n      style: page === 'contact' ? navActive : navBase,\n    });\n\n    // archive chips\n    const baseChip = { padding: '8px 15px', border: '1px solid #E3E1DD', background: '#fff', borderRadius: '999px', cursor: 'pointer', fontFamily: \"'Jost',sans-serif\", fontSize: '12px', letterSpacing: '0.12em', textTransform: 'uppercase', color: '#6E6B66', display: 'inline-flex', gap: '8px', alignItems: 'center', transition: 'all .2s' };\n    const activeChip = { ...baseChip, background: '#1A1A1A', color: '#fff', borderColor: '#1A1A1A' };\n    const chips = this.cats.map(c => ({\n      label: c,\n      count: counts[c],\n      onClick: () => this.setState({ activeCategory: c, selectedId: null }),\n      style: c === activeCategory ? activeChip : baseChip,\n      countStyle: { fontSize: '11px', opacity: c === activeCategory ? 0.6 : 0.4, fontWeight: 500 },\n    }));\n\n    // hero slides\n    let featured = this.featuredNames.map(n => all.find(p => p.name === n)).filter(Boolean);\n    if (!featured.length) featured = all.slice(0, 5);\n    this._heroLen = featured.length || 1;\n    const len = featured.length || 1;\n    const act = ((this.state.activeSlide % len) + len) % len;\n    const heroSlides = featured.map((p, i) => ({\n      name: p.name,\n      category: p.category,\n      style: {\n        position: 'absolute', inset: 0, background: this.GRADS[i % this.GRADS.length],\n        opacity: i === act ? 1 : 0,\n        transform: i === act ? 'scale(1.05)' : 'scale(1)',\n        transition: 'opacity 1.4s ease, transform 6s ease',\n      },\n    }));\n    const heroDots = featured.map((p, i) => ({\n      onClick: () => this.setState({ activeSlide: i }),\n      style: { width: '7px', height: '7px', borderRadius: '50%', cursor: 'pointer', padding: 0, border: '1px solid #1A1A1A', background: i === act ? '#1A1A1A' : 'transparent', transition: 'all .3s' },\n    }));\n\n    // marquee\n    const base = all.slice(0, Math.min(all.length, 10));\n    const marqueeItems = base.concat(base).map((p, i) => ({\n      name: p.name,\n      category: p.category,\n      onSelect: () => this.setState({ selectedId: p.id }),\n      tileStyle: { aspectRatio: '4/5', background: this.GRADS[i % this.GRADS.length], position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', border: '1px solid #E8E6E2' },\n    }));\n\n    // category cards\n    const categoryCards = this.cats.filter(c => c !== 'All').map((c, i) => ({\n      label: c,\n      count: counts[c],\n      onClick: () => this.enterCategory(c),\n      tileStyle: { aspectRatio: '5/4', background: this.GRADS[i % this.GRADS.length], position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', borderBottom: '1px solid #E8E6E2' },\n    }));\n\n    // detail\n    const sp = all.find(p => p.id === this.state.selectedId);\n    let selected = null;\n    if (sp) {\n      const e = enrich(sp);\n      const hasGem = !!(sp.gemstone && sp.gemstone.trim() && sp.gemstone.trim() !== '—');\n      selected = {\n        ...e,\n        onClose: () => this.setState({ selectedId: null }),\n        waHref: 'https://wa.me/' + wa + '?text=' + encodeURIComponent('Hello ' + brandName + ', I am interested in the “' + sp.name + '” (' + sp.category + '). Is it available?'),\n        hasGem,\n        hasDim: !!(sp.dimensions && sp.dimensions.trim()),\n        hasDesc: !!(sp.description && sp.description.trim()),\n      };\n    }\n\n    // contact\n    const cPhone = this.props.contactPhone ?? '+972 54-230-7870';\n    const cEmail = this.props.contactEmail ?? 'hello@heartsanddiamonds.co';\n    const cAddress = this.props.contactAddress ?? 'By appointment · Tel Aviv';\n    const cInsta = (this.props.contactInstagram ?? '@heartsanddiamonds').replace(/^@/, '');\n    const contact = {\n      phone: cPhone,\n      email: cEmail,\n      address: cAddress,\n      instagram: '@' + cInsta,\n      telHref: 'tel:' + cPhone.replace(/[^0-9+]/g, ''),\n      mailHref: 'mailto:' + cEmail,\n      igHref: 'https://instagram.com/' + cInsta,\n      waHref: 'https://wa.me/' + wa + '?text=' + encodeURIComponent('Hello ' + brandName + ', I would love to learn more about your collection.'),\n    };\n\n    // form handlers\n    const f = this.state.form;\n    const mk = (k) => (e) => this.setField(k, e.target.value);\n    const fh = f ? { name: mk('name'), category: mk('category'), price: mk('price'), metal: mk('metal'), gemstone: mk('gemstone'), dimensions: mk('dimensions'), description: mk('description'), goldWeight: mk('goldWeight') } : {};\n\n    return {\n      brandName, brandTagline, ownerPassword,\n      isHome: page === 'home',\n      isArchive: page === 'archive',\n      isContact: page === 'contact',\n      contact,\n      goHome: () => this.goHome(),\n      enterAll: () => this.enterCategory('All'),\n      navLinks,\n      heroSlides, heroDots,\n      marqueeItems,\n      categoryCards,\n      ownerMode,\n      ownerLabel: ownerMode ? 'Owner · On' : 'Owner',\n      ownerBtnStyle: {\n        fontFamily: \"'Jost',sans-serif\", fontSize: '11px', letterSpacing: '0.16em', textTransform: 'uppercase',\n        padding: '10px 16px', cursor: 'pointer', border: '1px solid #1A1A1A', transition: 'all .2s', whiteSpace: 'nowrap',\n        background: ownerMode ? '#1A1A1A' : '#fff', color: ownerMode ? '#fff' : '#1A1A1A',\n      },\n      onOwnerClick: () => { if (ownerMode) this.logout(); else this.openLogin(); },\n      loginOpen: this.state.loginOpen,\n      loginValue: this.state.loginValue,\n      loginError: this.state.loginError,\n      onLoginInput: (e) => this.setState({ loginValue: e.target.value, loginError: false }),\n      onLoginKey: (e) => { if (e.key === 'Enter') this.submitLogin(); },\n      onSubmitLogin: () => this.submitLogin(),\n      onCancelLogin: () => this.cancelLogin(),\n      query,\n      onSearch: (e) => { const v = e.target.value; this.setState({ query: v, page: v ? 'archive' : this.state.page }); },\n      chips,\n      pieces: piecesView,\n      resultCount: piecesView.length,\n      isEmpty: piecesView.length === 0,\n      onAdd: () => this.openAdd(),\n      onReset: () => { if (window.confirm('Reset the archive to the original sample pieces? Your changes will be lost.')) this.resetArchive(); },\n      selected,\n      goldChip,\n      stop: (e) => e.stopPropagation(),\n      formOpen: this.state.formOpen,\n      form: f,\n      formError: this.state.formError,\n      formTitle: this.state.formMode === 'add' ? 'Add a piece' : 'Edit piece',\n      fh,\n      onSaveForm: () => this.saveForm(),\n      onCancelForm: () => this.cancelForm(),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
